[package]
name = "tokmd-format"
version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Output formatting and serialization (Markdown, JSON, CSV) for tokmd."
readme = "README.md"
keywords = ["formatting", "markdown", "json", "csv", "serialization"]
categories = ["development-tools", "encoding"]
documentation = "https://docs.rs/tokmd-format"

[dependencies]
anyhow.workspace = true
csv = "1.4.0"
serde.workspace = true
serde_json.workspace = true
time = { version = "0.3.47", features = ["formatting"] }
uuid = { version = "1.23", features = ["v4", "js"] }
tokmd-redact.workspace = true
tokmd-scan-args.workspace = true
tokmd-settings.workspace = true
tokmd-types.workspace = true

[dev-dependencies]
proptest.workspace = true
insta = { workspace = true }
serde_json.workspace = true
tempfile.workspace = true
