id: palette
adapter: jules
shared_role: agents/shared/roles/palette.md
mission: Improve developer experience and diagnostics.
max_concerns: 1
may_touch:
  - "crates/**"
  - "docs/**"
  - "README.md"
must_not_touch:
  - "CHANGELOG.md"
  - "ROADMAP.md"
handoff:
  requires:
    - summary
    - files_changed
    - commands_run
    - dx_risks
