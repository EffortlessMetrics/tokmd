id: bolt
adapter: jules
shared_role: agents/shared/roles/bolt.md
mission: Find and fix one performance bottleneck per run.
max_concerns: 1
may_touch:
  - "crates/**"
must_not_touch:
  - "CHANGELOG.md"
  - "ROADMAP.md"
  - ".jules/runs/**"
  - ".jules/cache/**"
handoff:
  requires:
    - summary
    - files_changed
    - commands_run
    - proof_method
    - performance_risks
