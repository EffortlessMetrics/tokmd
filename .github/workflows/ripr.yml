name: ripr (advisory)

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ripr-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -C debuginfo=0

jobs:
  ripr:
    name: ripr (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Fetch base ref
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}" || true

      - name: Identify changed Rust files (production only)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          mkdir -p target/ripr
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- '*.rs' \
            | grep -v '/tests/' \
            | grep -v '_test\.rs$' \
            | grep -v '^fuzz/' \
            | grep -v '/fuzz/' \
            > target/ripr/changed.txt || true
          COUNT="$(wc -l < target/ripr/changed.txt | tr -d ' ')"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Install ripr (best-effort)
        id: install
        run: |
          set +e
          if cargo install ripr --locked >/dev/null 2>&1; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ripr not yet available on crates.io; running advisory placeholder."
          fi

      - name: Run ripr or placeholder
        run: |
          set -euo pipefail
          mkdir -p target/ripr
          if [ "${{ steps.install.outputs.installed }}" = "true" ]; then
            ripr analyze \
              --config ripr.toml \
              --diff-only \
              --json target/ripr/ripr.json \
              --sarif target/ripr/ripr.sarif \
              --markdown target/ripr/ripr.md \
              || true
            {
              echo "## ripr (advisory)"
              echo ""
              if [ -f target/ripr/ripr.md ]; then
                cat target/ripr/ripr.md
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          else
            cat <<'EOF' > target/ripr/ripr.md
          ## ripr (advisory)

          ripr is not yet wired up in this repo. This advisory job is a
          placeholder so the slot exists in the lane whitelist and the
          rollout (PR 11) lands. When ripr ships, replace the install
          step's fallback with the real binary and remove this notice.
          EOF
            cat target/ripr/ripr.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Evaluate ripr soft-gate
        if: github.event_name == 'pull_request'
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          set -euo pipefail
          # The soft-gate is opt-in via [soft_gate].enabled in ripr.toml.
          # Until that flag is true, this step only logs the planned
          # decision so reviewers can see what would have been gated.
          enabled=$(grep -E '^enabled\s*=\s*true' ripr.toml | head -1 || true)
          if [ -z "$enabled" ]; then
            echo "::notice::ripr soft-gate is disabled in ripr.toml. Findings remain advisory."
            exit 0
          fi
          # Override label check.
          for lbl in "ripr-waive" "full-ci" "ci-budget-ack"; do
            if echo "$LABELS_JSON" | grep -q "\"name\":\"$lbl\""; then
              echo "::warning::ripr soft-gate satisfied by override label '$lbl'."
              exit 0
            fi
          done
          # If a real ripr report exists, look for high-confidence
          # reachable_unrevealed / weakly_exposed entries that are not
          # suppressed. The placeholder run produces no JSON, so this
          # remains a no-op until ripr is wired up.
          if [ ! -s target/ripr/ripr.json ]; then
            echo "::notice::ripr soft-gate enabled but no JSON report; nothing to gate."
            exit 0
          fi
          high=$(jq '[.findings[]?
            | select(.kind == "reachable_unrevealed" or .kind == "weakly_exposed")
            | select(.confidence == "high")
            | select(.suppressed != true)
            | select(.test_changed_nearby != true)] | length' \
            target/ripr/ripr.json)
          if [ "${high:-0}" -gt 0 ]; then
            echo "::error::ripr soft-gate: ${high} high-confidence finding(s); apply 'ripr-waive' to acknowledge."
            exit 1
          fi
          echo "ripr soft-gate clean."

      - name: Upload ripr report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-report
          path: target/ripr/
          if-no-files-found: ignore
          retention-days: 14
