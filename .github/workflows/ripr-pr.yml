name: RIPR PR Evidence

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ripr-pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ripr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install ripr
        run: cargo install ripr --locked

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref || 'main' }}

      - name: RIPR PR evidence
        id: ripr_pr
        run: cargo xtask ripr-pr --base "origin/${{ github.base_ref || 'main' }}" --head HEAD

      - name: RIPR review guidance
        id: ripr_review
        run: cargo xtask ripr-review-comments --base "origin/${{ github.base_ref || 'main' }}" --head HEAD

      - name: RIPR PR contract
        if: always()
        run: |
          cargo xtask ripr-pr --check
          cargo xtask ripr-review-comments --check

      - name: RIPR summary
        if: always()
        shell: bash
        run: |
          {
            echo "## RIPR Review Guidance"
            echo
            if [ -f target/ripr/review/comments.md ]; then
              cat target/ripr/review/comments.md
            else
              echo "No RIPR review guidance produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: RIPR annotations
        if: always()
        run: python scripts/ripr-annotations.py

      - name: Upload RIPR PR evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-pr
          path: target/ripr/pr
          if-no-files-found: warn

      - name: Upload RIPR review guidance
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ripr-review
          path: target/ripr/review
          if-no-files-found: warn
